<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>3D Offshore Rig Simulator</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
    margin:0;
    overflow:hidden;
    font-family:Arial;
    background:black;
}

/* UI OVERLAY */
.ui{
    position:fixed;
    top:10px;
    left:10px;
    color:white;
    z-index:10;
    background:rgba(0,0,0,0.6);
    padding:15px;
    border:1px solid #00d9ff;
    border-radius:10px;
    width:250px;
}

h3{
    color:#00d9ff;
    margin-top:0;
}

button{
    width:100%;
    padding:10px;
    margin-top:8px;
    background:#00d9ff;
    border:none;
    cursor:pointer;
    font-weight:bold;
}

.status{
    margin-top:10px;
    font-size:14px;
    color:#00ff88;
}
</style>
</head>

<body>

<div class="ui">

<h3>Offshore 3D Rig Sim</h3>

<button onclick="toggleDrill()">Toggle Drill</button>
<button onclick="increasePressure()">Increase Pressure</button>
<button onclick="resetSim()">Reset System</button>

<div class="status" id="status">
System Stable
</div>

</div>

<!-- THREE JS -->
<script src="https://cdn.jsdelivr.net/npm/three@0.158.0/build/three.min.js"></script>

<script>

/* SCENE */
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x000814);

/* CAMERA */
const camera = new THREE.PerspectiveCamera(
75,
window.innerWidth/window.innerHeight,
0.1,
1000
);

camera.position.set(0,5,10);

/* RENDERER */
const renderer = new THREE.WebGLRenderer({antialias:true});
renderer.setSize(window.innerWidth, window.innerHeight);
document.body.appendChild(renderer.domElement);

/* LIGHTS */
const light = new THREE.DirectionalLight(0xffffff,1);
light.position.set(5,10,5);
scene.add(light);

scene.add(new THREE.AmbientLight(0x404040));

/* OIL RIG STRUCTURE */
const rig = new THREE.Group();

/* BASE */
const base = new THREE.Mesh(
new THREE.BoxGeometry(4,1,4),
new THREE.MeshStandardMaterial({color:0x333333})
);
rig.add(base);

/* TOWER */
const tower = new THREE.Mesh(
new THREE.CylinderGeometry(0.5,0.5,6),
new THREE.MeshStandardMaterial({color:0x00d9ff})
);
tower.position.y = 4;
rig.add(tower);

/* DRILL */
const drill = new THREE.Mesh(
new THREE.CylinderGeometry(0.2,0.2,3),
new THREE.MeshStandardMaterial({color:0xff0000})
);
drill.position.y = 1;
rig.add(drill);

scene.add(rig);

/* GROUND */
const ground = new THREE.Mesh(
new THREE.PlaneGeometry(100,100),
new THREE.MeshStandardMaterial({color:0x001122})
);
ground.rotation.x = -Math.PI/2;
scene.add(ground);

/* SIM VARIABLES */
let drilling = false;
let pressure = 70;

/* FUNCTIONS */
function toggleDrill(){
drilling = !drilling;
updateStatus("Drill: " + (drilling ? "ACTIVE" : "STOPPED"));
}

function increasePressure(){
pressure += 10;
if(pressure > 100){
updateStatus("⚠ CRITICAL PRESSURE LEVEL");
} else {
updateStatus("Pressure: " + pressure + "%");
}
}

function resetSim(){
pressure = 70;
drilling = false;
drill.position.y = 1;
updateStatus("System Reset");
}

/* STATUS */
function updateStatus(msg){
document.getElementById("status").innerText = msg;
}

/* ANIMATION LOOP */
function animate(){

requestAnimationFrame(animate);

/* DRILL MOVEMENT */
if(drilling){
drill.position.y -= 0.02;
if(drill.position.y < -2){
drill.position.y = 1;
}
}

/* ROTATE RIG */
rig.rotation.y += 0.002;

/* PRESSURE EFFECT */
if(pressure > 90){
rig.position.y = Math.sin(Date.now()*0.01)*0.2;
}

/* RENDER */
renderer.render(scene,camera);

}

animate();

/* RESIZE */
window.addEventListener("resize",()=>{

camera.aspect = window.innerWidth/window.innerHeight;
camera.updateProjectionMatrix();

renderer.setSize(window.innerWidth,window.innerHeight);

});

</script>

</body>
</html>

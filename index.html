<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Offshore SCADA Simulator v2</title>

<style>
body{
    margin:0;
    font-family:Arial;
    background:#050814;
    color:white;
}

/* LOGIN */
#loginScreen{
    position:fixed;
    inset:0;
    background:#000;
    display:flex;
    justify-content:center;
    align-items:center;
    flex-direction:column;
    z-index:9999;
}

input{
    padding:10px;
    margin:5px;
    width:200px;
}

/* TOPBAR */
.topbar{
    display:flex;
    justify-content:space-between;
    padding:15px;
    background:#0b1220;
    border-bottom:1px solid #1f2a44;
}

a{
    color:#00d9ff;
    margin-left:10px;
    cursor:pointer;
}

/* LAYOUT */
.container{
    display:flex;
}

/* SIDEBAR */
.sidebar{
    width:220px;
    background:#07101d;
    padding:15px;
    border-right:1px solid #1f2a44;
}

.unit{
    padding:10px;
    margin-bottom:10px;
    background:#0f172a;
    border:1px solid #1f2a44;
    cursor:pointer;
}

/* MAIN */
.main{
    flex:1;
    padding:15px;
}

/* GRID */
.grid{
    display:grid;
    grid-template-columns:repeat(3,1fr);
    gap:15px;
}

.card{
    background:#0f172a;
    padding:15px;
    border:1px solid #1f2a44;
    border-radius:10px;
}

/* TERMINAL */
.terminal{
    background:black;
    color:#00ff88;
    height:150px;
    overflow:auto;
    padding:10px;
    margin-top:15px;
    font-family:monospace;
}

/* ALERT */
.alert{
    position:fixed;
    right:20px;
    top:60px;
    padding:10px;
    border-radius:8px;
    z-index:999;
}

.warning{background:orange;}
.critical{background:red;}
.info{background:#1e3a8a;}

button{
    padding:10px;
    margin:5px;
    background:#00d9ff;
    border:none;
    cursor:pointer;
}
</style>
</head>

<body>

<!-- LOGIN -->
<div id="loginScreen">
<h2>SCADA LOGIN</h2>
<input id="user" placeholder="username">
<input id="pass" type="password" placeholder="password">
<button onclick="login()">Login</button>
</div>

<!-- APP -->
<div id="app" style="display:none;">

<div class="topbar">
<div>Offshore SCADA v2</div>
<div>
<a onclick="show('dashboard')">Dashboard</a>
<a onclick="show('inspection')">Inspection</a>
<a onclick="show('admin')">Admin</a>
</div>
</div>

<div class="container">

<!-- SIDEBAR -->
<div class="sidebar">
<div class="unit" onclick="selectRig('Alpha')">Rig Alpha</div>
<div class="unit" onclick="selectRig('Beta')">Rig Beta</div>
<div class="unit" onclick="selectRig('Gamma')">Rig Gamma</div>
</div>

<!-- MAIN -->
<div class="main">

<div id="dashboard">

<h3>SCADA Dashboard</h3>

<div class="grid">

<div class="card">
<h3>Pressure</h3>
<p id="pressure">--</p>
</div>

<div class="card">
<h3>Temperature</h3>
<p id="temp">--</p>
</div>

<div class="card">
<h3>Active Rig</h3>
<p id="rig">Alpha</p>
</div>

</div>

<button onclick="pump()">Pump</button>
<button onclick="cool()">Cooling</button>
<button onclick="togglePower()">Power</button>

<div class="terminal" id="log"></div>

</div>

<!-- INSPECTION -->
<div id="inspection" style="display:none">
<h3>Inspection Module</h3>

<label><input type="checkbox"> Pressure OK</label><br>
<label><input type="checkbox"> Cooling OK</label><br>
<label><input type="checkbox"> Generator OK</label><br>

<button onclick="submitInspection()">Submit</button>
</div>

<!-- ADMIN -->
<div id="admin" style="display:none">
<h3>Admin Panel</h3>

<button onclick="resetSystem()">Reset System</button>
<button onclick="emergencyShutdown()">Emergency Shutdown</button>
</div>

</div>

</div>

</div>

<script>

/* LOGIN */
function login(){
let u=document.getElementById("user").value;
let p=document.getElementById("pass").value;

if(u==="admin" && p==="1234"){
document.getElementById("loginScreen").style.display="none";
document.getElementById("app").style.display="block";
}
}

/* STATE */
let state={
rig:"Alpha",
pressure:70,
temp:55,
power:true
};

/* RIG SELECT */
function selectRig(r){
state.rig=r;
log("Rig selected: "+r);
}

/* SYSTEM ACTIONS */
function pump(){
state.pressure+=10;
log("Pump activated");
update();
}

function cool(){
state.temp-=5;
log("Cooling activated");
update();
}

function togglePower(){
state.power=!state.power;
log("Power toggled: "+state.power);
}

/* UPDATE SYSTEM */
function update(){

document.getElementById("pressure").innerText=state.pressure+"%";
document.getElementById("temp").innerText=state.temp+"°C";
document.getElementById("rig").innerText=state.rig;

/* ALERTS */
if(state.pressure>85){
alertBox("warning","High Pressure");
}

if(state.temp>75){
alertBox("critical","Overheat Risk");
}

}

/* LOG */
function log(msg){
let d=document.getElementById("log");
let p=document.createElement("p");
p.innerText=msg;
d.appendChild(p);
d.scrollTop=d.scrollHeight;
}

/* ALERT */
function alertBox(type,msg){
let a=document.createElement("div");
a.className="alert "+type;
a.innerText=msg;
document.body.appendChild(a);
setTimeout(()=>a.remove(),3000);
log("ALERT: "+msg);
}

/* INSPECTION */
function submitInspection(){
alert("Inspection submitted");
log("Inspection completed");
}

/* ADMIN */
function resetSystem(){
state.pressure=70;
state.temp=55;
update();
log("System reset");
}

function emergencyShutdown(){
state.power=false;
log("EMERGENCY SHUTDOWN");
}

/* AUTO SIMULATION */
setInterval(()=>{

if(state.power){
state.pressure+=(Math.random()-0.5)*2;
state.temp+=(Math.random()-0.5)*2;
update();
}

},2000);

/* INIT */
update();

</script>

</body>
</html>

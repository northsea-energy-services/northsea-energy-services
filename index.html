<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SCADA Offshore Control System</title>

<style>
body{
    margin:0;
    font-family:Arial;
    background:#050812;
    color:#fff;
    overflow:hidden;
}

/* TOP BAR */
.topbar{
    height:50px;
    background:#0b1220;
    display:flex;
    align-items:center;
    justify-content:space-between;
    padding:0 15px;
    border-bottom:1px solid #1f2a44;
}

.status-dot{
    width:10px;
    height:10px;
    border-radius:50%;
    background:lime;
    box-shadow:0 0 10px lime;
}

/* LAYOUT */
.container{
    display:flex;
    height:calc(100vh - 50px);
}

/* SIDEBAR */
.sidebar{
    width:260px;
    background:#07101d;
    border-right:1px solid #1f2a44;
    padding:15px;
}

.sidebar h3{
    color:#00d9ff;
}

.equipment{
    padding:10px;
    margin:8px 0;
    background:#0f172a;
    border:1px solid #1f2a44;
    border-radius:8px;
    cursor:pointer;
}

.equipment:hover{
    border-color:#00d9ff;
}

/* MAIN PANEL */
.main{
    flex:1;
    padding:15px;
    overflow:auto;
}

/* GRID */
.grid{
    display:grid;
    grid-template-columns:repeat(3,1fr);
    gap:15px;
}

.panel{
    background:#0f172a;
    border:1px solid #1f2a44;
    padding:15px;
    border-radius:10px;
    position:relative;
}

.panel h4{
    color:#00d9ff;
}

.value{
    font-size:28px;
    margin-top:10px;
}

/* GAUGE */
.bar{
    height:8px;
    background:#111;
    border-radius:10px;
    margin-top:10px;
    overflow:hidden;
}

.fill{
    height:100%;
    background:#00d9ff;
    width:60%;
}

/* TERMINAL */
.terminal{
    margin-top:15px;
    background:black;
    color:#00ff88;
    height:200px;
    overflow:auto;
    padding:10px;
    font-family:monospace;
    border:1px solid #1f2a44;
}

/* ALERT SYSTEM */
.alert{
    position:absolute;
    right:10px;
    top:10px;
    padding:8px 12px;
    border-radius:6px;
    font-size:12px;
    animation:fade 0.3s ease;
}

.low{ background:#1e3a8a; }
.medium{ background:orange; }
.critical{ background:red; }

@keyframes fade{
    from{opacity:0; transform:translateY(-10px);}
    to{opacity:1; transform:translateY(0);}
}

/* CONTROL BUTTONS */
.controls{
    margin-top:15px;
}

button{
    padding:10px;
    border:none;
    margin-right:5px;
    background:#00d9ff;
    cursor:pointer;
    font-weight:bold;
}

button:hover{
    opacity:0.8;
}
</style>
</head>

<body>

<!-- TOPBAR -->
<div class="topbar">
<div>SCADA Offshore Control System <span class="status-dot"></span></div>
<div id="clock"></div>
</div>

<div class="container">

<!-- SIDEBAR -->
<div class="sidebar">
<h3>Equipment</h3>

<div class="equipment" onclick="selectEquip('Rig Alpha')">Rig Alpha</div>
<div class="equipment" onclick="selectEquip('Pump Station')">Pump Station</div>
<div class="equipment" onclick="selectEquip('Cooling Unit')">Cooling Unit</div>
<div class="equipment" onclick="selectEquip('Generator')">Generator</div>

</div>

<!-- MAIN -->
<div class="main">

<h3>Live System Overview</h3>

<div class="grid">

<div class="panel">
<h4>Pressure</h4>
<div class="value" id="pressure">78%</div>
<div class="bar"><div class="fill" id="pFill"></div></div>
</div>

<div class="panel">
<h4>Temperature</h4>
<div class="value" id="temp">52°C</div>
<div class="bar"><div class="fill"></div></div>
</div>

<div class="panel">
<h4>Flow Rate</h4>
<div class="value" id="flow">14.2k bpd</div>
<div class="bar"><div class="fill"></div></div>
</div>

</div>

<!-- CONTROLS -->
<div class="controls">

<button onclick="triggerAlarm('low')">Test Low Alarm</button>
<button onclick="triggerAlarm('medium')">Test Medium Alarm</button>
<button onclick="triggerAlarm('critical')">Test Critical Alarm</button>

</div>

<!-- TERMINAL -->
<div class="terminal" id="terminal"></div>

</div>

</div>

<script>

/* CLOCK */
setInterval(()=>{
document.getElementById("clock").innerText =
new Date().toUTCString();
},1000);

/* TERMINAL LOG */
const terminal = document.getElementById("terminal");

function log(msg){
const p = document.createElement("p");
p.innerText = `[${new Date().toLocaleTimeString()}] ${msg}`;
terminal.appendChild(p);
terminal.scrollTop = terminal.scrollHeight;
}

/* EQUIPMENT SELECT */
function selectEquip(name){
log(`Operator selected: ${name}`);
}

/* SENSOR SIMULATION */
setInterval(()=>{

let pressure = Math.floor(Math.random()*30 + 60);

document.getElementById("pressure").innerText = pressure + "%";
document.getElementById("pFill").style.width = pressure + "%";

if(pressure > 85){
triggerAlarm("medium","Pressure high on system");
}

},3000);

/* ALERT ENGINE */
function triggerAlarm(level,msg){

const alert = document.createElement("div");
alert.className = `alert ${level}`;

alert.innerText = msg || level.toUpperCase() + " ALERT";

document.body.appendChild(alert);

setTimeout(()=>alert.remove(),4000);

log(`ALARM: ${level.toUpperCase()} - ${msg || "System event"}`);
}

/* AUTO SYSTEM LOGS */
setInterval(()=>{

const logs = [
"Pressure stable",
"Flow within limits",
"Sensor sync complete",
"Rig Alpha operational",
"Cooling system normal"
];

log(logs[Math.floor(Math.random()*logs.length)]);

},5000);

</script>

</body>
</html>

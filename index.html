<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>SCADA Control System - Clean Build</title>

<style>
body{
    margin:0;
    font-family:Arial;
    background:#050814;
    color:white;
}

/* LOGIN SCREEN */
#login{
    position:fixed;
    inset:0;
    background:#000;
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
    z-index:9999;
}

input{
    padding:10px;
    margin:5px;
    width:220px;
}

button{
    padding:10px;
    width:220px;
    background:#00d9ff;
    border:none;
    cursor:pointer;
}

/* TOP BAR */
.header{
    display:flex;
    justify-content:space-between;
    padding:15px;
    background:#0b1220;
    border-bottom:1px solid #1f2a44;
}

/* GRID */
.grid{
    display:grid;
    grid-template-columns:repeat(3,1fr);
    gap:15px;
    padding:15px;
}

.card{
    background:#0f172a;
    padding:15px;
    border-radius:10px;
    border:1px solid #1f2a44;
}

/* LOG */
#log{
    position:fixed;
    bottom:10px;
    left:10px;
    width:350px;
    height:140px;
    overflow:auto;
    background:black;
    color:#00ff88;
    font-size:12px;
    padding:10px;
    border:1px solid #1f2a44;
}

/* ALERT */
.alert{
    position:fixed;
    right:10px;
    top:70px;
    padding:10px;
    border-radius:8px;
    color:white;
}

.warning{background:orange;}
.critical{background:red;}
.info{background:#1e3a8a;}
</style>
</head>

<body>

<!-- LOGIN -->
<div id="login">
<h2>SCADA LOGIN</h2>
<input id="user" placeholder="Username">
<input id="pass" type="password" placeholder="Password">
<button onclick="login()">ENTER SYSTEM</button>
</div>

<!-- MAIN SYSTEM -->
<div id="app" style="display:none;">

<div class="header">
<div>OFFSHORE SCADA CONTROL</div>
<div id="status">SYSTEM: STABLE</div>
</div>

<div class="grid">

<div class="card">
<h3>Rig Alpha</h3>
<p id="a">Pressure: 70 | Temp: 55</p>
<button onclick="select('Alpha')">Select</button>
</div>

<div class="card">
<h3>Rig Beta</h3>
<p id="b">Pressure: 68 | Temp: 52</p>
<button onclick="select('Beta')">Select</button>
</div>

<div class="card">
<h3>Rig Gamma</h3>
<p id="c">Pressure: 72 | Temp: 60</p>
<button onclick="select('Gamma')">Select</button>
</div>

</div>

<div id="log"></div>

</div>

<script>

/* =====================
   LOGIN SYSTEM
===================== */

function login(){

let u=document.getElementById("user").value;
let p=document.getElementById("pass").value;

/* SIMPLE DEMO LOGIN */
if(u==="admin" && p==="1234"){

document.getElementById("login").style.display="none";
document.getElementById("app").style.display="block";

log("ACCESS GRANTED");

startSystem();

}else{

alert("ACCESS DENIED");

}

}

/* =====================
   SYSTEM STATE
===================== */

let rigs={
Alpha:{p:70,t:55},
Beta:{p:68,t:52},
Gamma:{p:72,t:60}
};

let selected=null;

/* =====================
   SELECT RIG
===================== */

function select(r){
selected=r;
log("Selected rig: "+r);
}

/* =====================
   LOG SYSTEM
===================== */

function log(msg){

let d=document.getElementById("log");

let p=document.createElement("div");
p.innerText=msg;

d.appendChild(p);

if(d.children.length>30){
d.removeChild(d.firstChild);
}

d.scrollTop=d.scrollHeight;

}

/* =====================
   ALERT SYSTEM
===================== */

function alertBox(type,msg){

let a=document.createElement("div");
a.className="alert "+type;
a.innerText=msg;

document.body.appendChild(a);

setTimeout(()=>a.remove(),3000);

log("ALERT: "+msg);

}

/* =====================
   UPDATE SYSTEM
===================== */

function update(){

rigs.Alpha.p+=(Math.random()-0.5)*2;
rigs.Alpha.t+=(Math.random()-0.5)*1.5;

rigs.Beta.p+=(Math.random()-0.5)*2;
rigs.Beta.t+=(Math.random()-0.5)*1.5;

rigs.Gamma.p+=(Math.random()-0.5)*2;
rigs.Gamma.t+=(Math.random()-0.5)*1.5;

/* LIMITS */
for(let r in rigs){

rigs[r].p=Math.max(50,Math.min(90,rigs[r].p));
rigs[r].t=Math.max(40,Math.min(75,rigs[r].t));

if(rigs[r].p>85){
alertBox("warning",r+" HIGH PRESSURE");
}

if(rigs[r].t>72){
alertBox("critical",r+" OVERHEAT");
}

}

/* UI */
document.getElementById("a").innerText=
`Pressure: ${rigs.Alpha.p.toFixed(1)} | Temp: ${rigs.Alpha.t.toFixed(1)}`;

document.getElementById("b").innerText=
`Pressure: ${rigs.Beta.p.toFixed(1)} | Temp: ${rigs.Beta.t.toFixed(1)}`;

document.getElementById("c").innerText=
`Pressure: ${rigs.Gamma.p.toFixed(1)} | Temp: ${rigs.Gamma.t.toFixed(1)}`;

}

/* =====================
   SYSTEM LOOP
===================== */

function startSystem(){

setInterval(update,1500);

log("SCADA SYSTEM ONLINE");

}

</script>

</body>
</html>

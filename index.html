<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>SCADA v2 - 3D Offshore Control Room</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
    margin:0;
    overflow:hidden;
    font-family:Arial;
    background:black;
}

/* HUD */
#hud{
    position:fixed;
    top:10px;
    left:10px;
    width:280px;
    background:rgba(0,0,0,0.7);
    color:white;
    padding:12px;
    border:1px solid #00d9ff;
    border-radius:10px;
    z-index:10;
}

button{
    width:100%;
    margin-top:6px;
    padding:8px;
    background:#00d9ff;
    border:none;
    cursor:pointer;
    font-weight:bold;
}

/* LOG */
#log{
    margin-top:10px;
    height:120px;
    overflow:auto;
    font-size:12px;
    color:#00ff88;
}

/* ALERT */
.alert{
    position:fixed;
    right:20px;
    top:20px;
    padding:10px;
    border-radius:8px;
    color:white;
    z-index:999;
}

.warning{background:orange;}
.critical{background:red;}
</style>
</head>

<body>

<!-- HUD -->
<div id="hud">

<h3>SCADA v2 CONTROL ROOM</h3>

<div>Selected: <span id="selected">None</span></div>

<button onclick="toggleSim()">Start/Stop Simulation</button>
<button onclick="injectFault()">Inject Fault</button>

<div id="log"></div>

</div>

<!-- THREE JS -->
<script src="https://cdn.jsdelivr.net/npm/three@0.158.0/build/three.min.js"></script>

<script>

/* =========================
   SCENE SETUP
========================= */

const scene=new THREE.Scene();
scene.background=new THREE.Color(0x001018);

const camera=new THREE.PerspectiveCamera(75,innerWidth/innerHeight,0.1,1000);
camera.position.set(0,8,18);

const renderer=new THREE.WebGLRenderer({antialias:true});
renderer.setSize(innerWidth,innerHeight);
document.body.appendChild(renderer.domElement);

/* LIGHT */
scene.add(new THREE.AmbientLight(0xffffff,0.4));

const light=new THREE.DirectionalLight(0xffffff,1);
light.position.set(10,20,10);
scene.add(light);

/* =========================
   OCEAN
========================= */

const ocean=new THREE.Mesh(
new THREE.PlaneGeometry(200,200),
new THREE.MeshStandardMaterial({color:0x003344})
);

ocean.rotation.x=-Math.PI/2;
scene.add(ocean);

/* =========================
   RIGS
========================= */

const rigs=[];

function createRig(name,x,z,color){

const g=new THREE.Group();

const base=new THREE.Mesh(
new THREE.BoxGeometry(2,1,2),
new THREE.MeshStandardMaterial({color:0x333333})
);

const tower=new THREE.Mesh(
new THREE.CylinderGeometry(0.5,0.5,5),
new THREE.MeshStandardMaterial({color})
);

tower.position.y=3;

g.add(base);
g.add(tower);

g.position.set(x,0,z);

g.userData={
name,
pressure:70+Math.random()*10,
temp:50+Math.random()*10
};

scene.add(g);
rigs.push(g);

}

createRig("Alpha",-10,0,0x00d9ff);
createRig("Beta",10,0,0xffaa00);
createRig("Gamma",0,-15,0xff0000);

/* =========================
   CLICK SELECT
========================= */

const ray=new THREE.Raycaster();
const mouse=new THREE.Vector2();

window.addEventListener("click",(e)=>{

mouse.x=(e.clientX/innerWidth)*2-1;
mouse.y=-(e.clientY/innerHeight)*2+1;

ray.setFromCamera(mouse,camera);

const hits=ray.intersectObjects(scene.children,true);

if(hits.length){

let obj=hits[0].object.parent;

if(obj && obj.userData.name){

selectRig(obj.userData.name);

}

}

});

/* =========================
   STATE
========================= */

let running=true;
let selectedRig=null;

/* =========================
   UI FUNCTIONS
========================= */

function selectRig(name){
selectedRig=name;
document.getElementById("selected").innerText=name;
log("Rig selected: "+name);
}

function toggleSim(){
running=!running;
log("Simulation: "+running);
}

function injectFault(){
log("FAULT injected");
alertBox("critical","System Fault Injected");
}

/* =========================
   ALERT SYSTEM
========================= */

function alertBox(type,msg){

const a=document.createElement("div");
a.className="alert "+type;
a.innerText=msg;

document.body.appendChild(a);

setTimeout(()=>a.remove(),3000);

log("ALERT: "+msg);

}

/* =========================
   LOG
========================= */

function log(msg){

const d=document.getElementById("log");

const p=document.createElement("div");
p.innerText=msg;

d.appendChild(p);

if(d.children.length>30){
d.removeChild(d.firstChild);
}

d.scrollTop=d.scrollHeight;

}

/* =========================
   UPDATE ENGINE
========================= */

function update(){

rigs.forEach(r=>{

if(running){

r.userData.pressure+=(Math.random()-0.5)*1.5;
r.userData.temp+=(Math.random()-0.5)*1.2;

}

/* clamp */
r.userData.pressure=Math.max(50,Math.min(90,r.userData.pressure));
r.userData.temp=Math.max(40,Math.min(75,r.userData.temp));

/* alarms */
if(r.userData.pressure>85){
alertBox("warning",r.userData.name+" HIGH PRESSURE");
}

if(r.userData.temp>72){
alertBox("critical",r.userData.name+" OVERHEAT");
}

});

}

/* =========================
   LOOP
========================= */

function animate(){

requestAnimationFrame(animate);

update();

renderer.render(scene,camera);

}

animate();

/* RESIZE */
window.addEventListener("resize",()=>{

camera.aspect=innerWidth/innerHeight;
camera.updateProjectionMatrix();
renderer.setSize(innerWidth,innerHeight);

});

</script>

</body>
</html>

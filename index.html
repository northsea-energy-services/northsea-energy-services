<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>SCADA Offshore Control System</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
margin:0;
overflow:hidden;
font-family:Arial;
background:#000814;
color:white;
}

/* LOGIN */
#login{
position:fixed;
inset:0;
background:black;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
z-index:9999;
}

input,select{
padding:10px;
margin:5px;
width:220px;
}

button{
padding:10px;
width:220px;
background:#00d9ff;
border:none;
cursor:pointer;
}

/* HUD */
#hud{
position:fixed;
top:10px;
left:10px;
width:300px;
background:rgba(0,0,0,0.6);
border:1px solid #00d9ff;
padding:10px;
z-index:10;
}

/* LOG */
#log{
height:120px;
overflow:auto;
font-size:12px;
color:#00ff88;
margin-top:10px;
}

/* ALARMS */
#alarms{
position:fixed;
right:10px;
top:10px;
width:260px;
background:#0b1220;
border:1px solid #1f2a44;
padding:10px;
height:300px;
overflow:auto;
}

.alarm{
font-size:12px;
margin:5px 0;
padding:5px;
border-left:3px solid;
}

.warning{border-color:orange;color:orange;}
.critical{border-color:red;color:red;}

canvas{display:block;}
</style>
</head>

<body>

<!-- LOGIN -->
<div id="login">
<h2>SCADA LOGIN</h2>
<input id="user" placeholder="Username">
<input id="pass" type="password" placeholder="Password">
<select id="role">
<option value="operator">Operator</option>
<option value="engineer">Engineer</option>
<option value="admin">Admin</option>
</select>
<button onclick="login()">ENTER SYSTEM</button>
</div>

<!-- HUD -->
<div id="hud" style="display:none;">
<h3>OFFSHORE SCADA</h3>
<div>Selected: <span id="selected">None</span></div>
<button onclick="toggle()">Start/Stop</button>
<div id="log"></div>
</div>

<!-- ALARMS -->
<div id="alarms" style="display:none;">
<h4>ALARMS</h4>
</div>

<script src="https://cdn.jsdelivr.net/npm/three@0.158.0/build/three.min.js"></script>

<script>

/* =========================
   LOGIN
========================= */

let role=null;
let running=true;
let selected=null;

function login(){

const u=document.getElementById("user").value;
const p=document.getElementById("pass").value;
const r=document.getElementById("role").value;

if(u==="admin" && p==="1234"){

role=r;

document.getElementById("login").style.display="none";
document.getElementById("hud").style.display="block";
document.getElementById("alarms").style.display="block";

log("ACCESS GRANTED: "+role);

start();

}else{
alert("ACCESS DENIED");
}

}

/* =========================
   THREE JS WORLD
========================= */

const scene=new THREE.Scene();
scene.background=new THREE.Color(0x001018);

const camera=new THREE.PerspectiveCamera(75,innerWidth/innerHeight,0.1,1000);
camera.position.set(0,8,18);

const renderer=new THREE.WebGLRenderer({antialias:true});
renderer.setSize(innerWidth,innerHeight);
document.body.appendChild(renderer.domElement);

scene.add(new THREE.AmbientLight(0xffffff,0.4));

const light=new THREE.DirectionalLight(0xffffff,1);
light.position.set(10,20,10);
scene.add(light);

/* OCEAN */
const ocean=new THREE.Mesh(
new THREE.PlaneGeometry(200,200),
new THREE.MeshStandardMaterial({color:0x003344})
);
ocean.rotation.x=-Math.PI/2;
scene.add(ocean);

/* RIGS */
const rigs=[];

function createRig(name,x,z,color){

const g=new THREE.Group();

const base=new THREE.Mesh(
new THREE.BoxGeometry(2,1,2),
new THREE.MeshStandardMaterial({color:0x333})
);

const tower=new THREE.Mesh(
new THREE.CylinderGeometry(0.5,0.5,5),
new THREE.MeshStandardMaterial({color})
);

tower.position.y=3;

g.add(base);
g.add(tower);

g.position.set(x,0,z);

g.userData={
name,
p:70+Math.random()*10,
t:50+Math.random()*10
};

scene.add(g);
rigs.push(g);

}

createRig("Alpha",-10,0,0x00d9ff);
createRig("Beta",10,0,0xffaa00);
createRig("Gamma",0,-15,0xff0000);

/* CLICK */
const ray=new THREE.Raycaster();
const mouse=new THREE.Vector2();

window.addEventListener("click",(e)=>{

mouse.x=(e.clientX/innerWidth)*2-1;
mouse.y=-(e.clientY/innerHeight)*2+1;

ray.setFromCamera(mouse,camera);

const hits=ray.intersectObjects(scene.children,true);

if(hits.length){

let obj=hits[0].object.parent;

if(obj.userData.name){
selected=obj.userData.name;
document.getElementById("selected").innerText=selected;
log("Selected "+selected);
}

}

});

/* =========================
   ALARM SYSTEM (INDUSTRIAL)
========================= */

let alarmState={};

function alarm(msg,type){

if(alarmState[msg]) return;

alarmState[msg]=true;

let d=document.createElement("div");
d.className="alarm "+type;
d.innerText=msg;

document.getElementById("alarms").appendChild(d);

setTimeout(()=>d.remove(),5000);

log("ALERT: "+msg);

}

/* =========================
   LOG
========================= */

function log(msg){

let l=document.getElementById("log");

let p=document.createElement("div");
p.innerText=msg;

l.appendChild(p);

if(l.children.length>40){
l.removeChild(l.firstChild);
}

l.scrollTop=l.scrollHeight;

}

/* =========================
   SIMULATION
========================= */

function update(){

rigs.forEach(r=>{

if(running){

r.userData.p+=(Math.random()-0.5)*1.2;
r.userData.t+=(Math.random()-0.5)*1.0;

}

r.userData.p=Math.max(50,Math.min(90,r.userData.p));
r.userData.t=Math.max(40,Math.min(75,r.userData.t));

if(r.userData.p>85){
alarm(r.userData.name+" HIGH PRESSURE","warning");
}

if(r.userData.t>72){
alarm(r.userData.name+" OVERHEAT","critical");
}

});

}

/* =========================
   LOOP
========================= */

function animate(){

requestAnimationFrame(animate);

update();

renderer.render(scene,camera);

}

animate();

/* START */
function start(){
log("SYSTEM ONLINE");
}

/* TOGGLE */
function toggle(){
running=!running;
log("Simulation: "+running);
}

/* RESIZE */
window.addEventListener("resize",()=>{

camera.aspect=innerWidth/innerHeight;
camera.updateProjectionMatrix();
renderer.setSize(innerWidth,innerHeight);

});

</script>

</body>
</html>

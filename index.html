<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SCADA Industrial Simulator</title>

<style>
body{
    margin:0;
    font-family:Arial;
    background:#030814;
    color:#fff;
}

/* TOP BAR */
.topbar{
    height:50px;
    background:#0b1220;
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:0 15px;
    border-bottom:1px solid #1f2a44;
}

.status{
    display:flex;
    align-items:center;
    gap:10px;
}

.dot{
    width:10px;
    height:10px;
    border-radius:50%;
    background:lime;
    box-shadow:0 0 10px lime;
}

/* LAYOUT */
.container{
    display:flex;
    height:calc(100vh - 50px);
}

/* SIDEBAR */
.sidebar{
    width:260px;
    background:#07101d;
    border-right:1px solid #1f2a44;
    padding:15px;
}

.unit{
    background:#0f172a;
    padding:10px;
    margin-bottom:10px;
    border-radius:8px;
    cursor:pointer;
    border:1px solid #1f2a44;
}

.unit:hover{
    border-color:#00d9ff;
}

/* MAIN */
.main{
    flex:1;
    padding:15px;
    overflow:auto;
}

/* GRID */
.grid{
    display:grid;
    grid-template-columns:repeat(3,1fr);
    gap:15px;
}

.card{
    background:#0f172a;
    border:1px solid #1f2a44;
    border-radius:10px;
    padding:15px;
    position:relative;
}

.card h3{
    color:#00d9ff;
}

.value{
    font-size:30px;
    margin-top:10px;
}

/* GAUGE */
.bar{
    height:10px;
    background:#111;
    border-radius:10px;
    overflow:hidden;
    margin-top:10px;
}

.fill{
    height:100%;
    background:#00d9ff;
    width:60%;
    transition:0.3s;
}

/* TERMINAL */
.terminal{
    margin-top:15px;
    height:180px;
    background:black;
    color:#00ff88;
    padding:10px;
    font-family:monospace;
    overflow:auto;
    border:1px solid #1f2a44;
}

/* ALERTS */
.alert{
    position:fixed;
    right:20px;
    top:60px;
    padding:12px;
    border-radius:8px;
    animation:slide 0.3s ease;
    z-index:9999;
}

.info{background:#1e3a8a;}
.warning{background:orange;}
.critical{background:red;}

@keyframes slide{
    from{transform:translateX(200px);opacity:0;}
    to{transform:translateX(0);opacity:1;}
}

/* CONTROL BUTTONS */
.controls{
    margin-top:15px;
}

button{
    padding:10px;
    margin-right:5px;
    background:#00d9ff;
    border:none;
    font-weight:bold;
    cursor:pointer;
}

button:active{
    transform:scale(0.96);
}
</style>
</head>

<body>

<div class="topbar">
<div class="status">
<div class="dot"></div>
SCADA SIMULATION ACTIVE
</div>
<div id="clock"></div>
</div>

<div class="container">

<!-- SIDEBAR -->
<div class="sidebar">

<h3 style="color:#00d9ff;">Equipment Control</h3>

<div class="unit" onclick="selectUnit('Rig Alpha')">Rig Alpha</div>
<div class="unit" onclick="selectUnit('Pump Station')">Pump Station</div>
<div class="unit" onclick="selectUnit('Cooling Unit')">Cooling Unit</div>
<div class="unit" onclick="selectUnit('Generator')">Generator</div>

</div>

<!-- MAIN -->
<div class="main">

<h3>Live Industrial Systems</h3>

<div class="grid">

<div class="card">
<h3>Pressure</h3>
<div class="value" id="pressure">70%</div>
<div class="bar"><div class="fill" id="pFill"></div></div>
</div>

<div class="card">
<h3>Temperature</h3>
<div class="value" id="temp">55°C</div>
<div class="bar"><div class="fill" id="tFill"></div></div>
</div>

<div class="card">
<h3>System Load</h3>
<div class="value" id="load">Normal</div>
</div>

</div>

<!-- CONTROLS -->
<div class="controls">

<button onclick="ackAlarms()">Acknowledge Alarms</button>
<button onclick="emergencyShutdown()">Emergency Shutdown</button>
<button onclick="resetSystem()">Reset System</button>

</div>

<!-- TERMINAL -->
<div class="terminal" id="terminal"></div>

</div>

</div>

<script>

/* SYSTEM STATE */
let pressure = 70;
let temp = 55;
let systemRunning = true;

/* CLOCK */
setInterval(()=>{
document.getElementById("clock").innerText =
new Date().toUTCString();
},1000);

/* LOG */
const terminal = document.getElementById("terminal");

function log(msg){
const p = document.createElement("p");
p.innerText = `[${new Date().toLocaleTimeString()}] ${msg}`;
terminal.appendChild(p);
terminal.scrollTop = terminal.scrollHeight;
}

/* ALERT ENGINE */
function alertSystem(type,msg){

const a = document.createElement("div");
a.className = `alert ${type}`;
a.innerText = msg;

document.body.appendChild(a);

setTimeout(()=>a.remove(),4000);

log(`${type.toUpperCase()}: ${msg}`);
}

/* EQUIPMENT CONTROL */
function selectUnit(unit){

log("Operator selected: " + unit);

switch(unit){

case "Rig Alpha":
systemRunning = !systemRunning;
alertSystem("warning","Rig Alpha drill toggled");
break;

case "Pump Station":
pressure += 12;
alertSystem("info","Pump Station increased pressure");
break;

case "Cooling Unit":
temp -= 6;
alertSystem("info","Cooling system engaged");
break;

case "Generator":
systemRunning = true;
alertSystem("info","Generator stabilized power");
break;

}

updateSystems();
}

/* SYSTEM UPDATE */
function updateSystems(){

pressure = Math.max(50,Math.min(100,pressure));
temp = Math.max(35,Math.min(90,temp));

document.getElementById("pressure").innerText = Math.floor(pressure)+"%";
document.getElementById("temp").innerText = Math.floor(temp)+"°C";

document.getElementById("pFill").style.width = pressure+"%";
document.getElementById("tFill").style.width = temp+"%";

/* INTERLOCKS */
if(pressure > 85){
alertSystem("critical","Pressure Critical - System Stress");
}

if(temp > 75){
alertSystem("critical","Overheat Detected - Cooling Failure Risk");
}

if(pressure > 90 && temp > 80){
alertSystem("critical","SYSTEM TRIP INITIATED");
systemShutdown();
}

}

/* AUTO DRIFT */
setInterval(()=>{

if(systemRunning){

pressure += (Math.random()-0.5)*3;
temp += (Math.random()-0.5)*2;

updateSystems();

}

},2500);

/* ACTIONS */
function ackAlarms(){
alertSystem("info","Alarms acknowledged by operator");
}

function emergencyShutdown(){
alertSystem("critical","EMERGENCY SHUTDOWN ACTIVATED");
systemShutdown();
}

function systemShutdown(){
systemRunning = false;
log("SYSTEM: All operations halted");
}

function resetSystem(){
pressure = 70;
temp = 55;
systemRunning = true;
alertSystem("info","System reset complete");
updateSystems();
}

/* INIT */
updateSystems();

</script>

</body>
</html>
